<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Roots — Master Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Serif 4',Georgia,serif;background:linear-gradient(180deg,#FCFBE4,#F7F5E8);min-height:100vh;}
.hdr{background:#363A2E;padding:20px 16px 14px;position:sticky;top:0;z-index:100;}
.hdr-in{max-width:1100px;margin:0 auto;}
.t-row{display:flex;align-items:baseline;gap:10px;margin-bottom:3px;}
.t-main{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:#FCFBE4;}
.t-sub{font-size:12px;color:#99BAB4;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.st-row{font-size:11px;color:#EFDBB2;opacity:0.8;margin-bottom:10px;}
.lyr{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.lyr-l{font-size:9px;color:#99BAB4;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-right:2px;}
.lb{padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all 0.15s;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(239,219,178,0.3);opacity:0.5;}
.lb.on{opacity:1;}
.ld{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dh{max-width:1100px;margin:0 auto;padding:0 12px;}
.dhg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));padding:8px 0 2px;position:sticky;top:95px;z-index:90;background:#FCFBE4;}
.dhl{text-align:center;font-size:9px;font-weight:700;color:#583B1F;letter-spacing:1.5px;text-transform:uppercase;padding:2px 0;}
.wks{max-width:1100px;margin:0 auto;padding:0 12px 40px;}
.mh{padding:16px 0 5px;border-bottom:2px solid #B68036;margin-bottom:5px;}
.mh span{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:#363A2E;}
.wg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:rgba(255,255,255,0.6);border-radius:6px;border:1px solid rgba(54,58,46,0.08);margin-bottom:4px;box-shadow:0 1px 2px rgba(0,0,0,0.03);overflow:hidden;}
.dc{padding:4px 3px;min-height:60px;border-right:1px solid rgba(54,58,46,0.05);position:relative;}
.dc:last-child{border-right:none;}
.dc.td{background:rgba(153,186,180,0.15);}
.dc.we{background:rgba(239,219,178,0.08);}
.dn{font-size:11px;font-weight:600;color:#363A2E;margin-bottom:2px;display:flex;align-items:center;gap:2px;}
.dn.td{font-weight:800;color:#99BAB4;}
.td-dot{width:4px;height:4px;border-radius:50%;background:#99BAB4;}
a.ev{display:block;border-radius:0 3px 3px 0;padding:2px 4px;margin-bottom:1px;font-size:9px;font-weight:600;line-height:1.3;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;text-decoration:none;cursor:pointer;transition:opacity 0.1s;}
a.ev:hover{opacity:0.75;}
.ev-t{font-size:8px;font-weight:400;opacity:0.65;margin-top:0px;}
.ft{background:#363A2E;padding:14px 16px;text-align:center;}
.ft-t{font-size:9px;color:#99BAB4;letter-spacing:0.6px;max-width:800px;margin:0 auto;line-height:1.4;}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="t-row"><span class="t-main">Lake Roots</span><span class="t-sub">Master Calendar</span></div>
  <div class="st-row">April – September 2026 <span id="badge" style="color:#99BAB4;margin-left:8px;opacity:0.6">○ Connecting…</span></div>
  <div class="lyr" id="btns"></div>
</div></div>
<div class="dh"><div class="dhg" id="dh"></div></div>
<div class="wks" id="wks"></div>
<div class="ft"><div class="ft-t" id="ft">Loading…</div></div>

<script>
var P="https://effervescent-bienenstitch-c0ba8a.netlify.app/.netlify/functions/proxy";
var C={
  lr:{l:"Lake Roots",bg:"#E2F0E9",br:"#6B9E7E",tx:"#2D5A3E"},
  holiday:{l:"Holiday",bg:"#F9E4E4",br:"#D4868A",tx:"#8B3A3E"},
  d47:{l:"D47",bg:"#E3ECF6",br:"#7BA3CC",tx:"#2E5580"},
  d155:{l:"D155",bg:"#DAEAF8",br:"#5B8DB8",tx:"#1E4870"},
  parkdist:{l:"Park District",bg:"#F0F7E8",br:"#7DA45C",tx:"#3A5C1E"},
  dole:{l:"The Dole",bg:"#FBF0DA",br:"#C9A45C",tx:"#6B5420"},
  raue:{l:"Raue Center",bg:"#FCE8E8",br:"#C47070",tx:"#6B2020"},
  downtowncl:{l:"Downtown CL",bg:"#EDE8F5",br:"#8E7CB8",tx:"#3E2E6B"},
  community:{l:"Other Community",bg:"#F5EFDC",br:"#A89868",tx:"#5C4F2E"},
  deadline:{l:"LR Deadline",bg:"#F5E6F0",br:"#B07AAC",tx:"#6B3A68"}
};
var S=[
  // HOLIDAYS
  {d:"2026-05-05",c:"holiday",t:"Cinco de Mayo",u:""},
  {d:"2026-05-10",c:"holiday",t:"Mother's Day",u:""},
  {d:"2026-05-25",c:"holiday",t:"Memorial Day",u:""},
  {d:"2026-06-14",c:"holiday",t:"Flag Day",u:""},
  {d:"2026-06-19",c:"holiday",t:"Juneteenth",u:""},
  {d:"2026-06-21",c:"holiday",t:"Father's Day",u:""},
  {d:"2026-07-04",c:"holiday",t:"Independence Day",u:""},
  {d:"2026-09-07",c:"holiday",t:"Labor Day",u:""},
  // D47
  {d:"2026-04-22",c:"d47",t:"Early Release",ti:"K-8",u:"https://www.d47.org/families/calendar"},
  {d:"2026-05-13",c:"d47",t:"Early Release",ti:"K-8",u:"https://www.d47.org/families/calendar"},
  {d:"2026-05-20",c:"d47",t:"Last Day PreK/K",u:"https://www.d47.org/families/calendar"},
  {d:"2026-05-21",c:"d47",t:"Last Day Grades 1-8",u:"https://www.d47.org/families/calendar"},
  {d:"2026-08-12",c:"d47",t:"Teacher Institute",ti:"Aug 12-15",u:"https://www.d47.org/families/calendar"},
  {d:"2026-08-18",c:"d47",t:"First Day Grades 1-8",u:"https://www.d47.org/families/calendar"},
  {d:"2026-08-19",c:"d47",t:"First Day PreK/K",u:"https://www.d47.org/families/calendar"},
  // D155
  {d:"2026-04-24",c:"d155",t:"Early Release",ti:"12:53pm",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-16",c:"d155",t:"Graduation",ti:"10am",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-19",c:"d155",t:"Finals Begin",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-20",c:"d155",t:"Last Day",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-08-19",c:"d155",t:"First Day",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  // PARK DISTRICT
  {d:"2026-05-26",c:"parkdist",t:"Concerts in the Park Begin",ti:"Tuesdays 7pm, Main Beach",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-02",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-09",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-16",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-23",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-30",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-07-07",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-07-14",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-07-18",c:"parkdist",t:"Cardboard Regatta",ti:"Main Beach",u:"https://cardboardregatta.org/"},
  {d:"2026-07-21",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-07-28",c:"parkdist",t:"Concert in the Park",ti:"7pm",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-08-04",c:"parkdist",t:"Concert in the Park",ti:"7pm (final)",u:"https://www.crystallakeparks.org/special-events"},
  // DOLE
  {d:"2026-04-19",c:"dole",t:"Farmers Market+ Indoor",ti:"10am-2pm",u:"https://www.farmersmarketatthedole.org/"},
  {d:"2026-04-24",c:"dole",t:"4th Fridays Art Show",ti:"$10 entry",u:"https://www.thedole.org/"},
  {d:"2026-04-26",c:"dole",t:"Last Winter Market+",u:"https://www.farmersmarketatthedole.org/"},
  {d:"2026-05-01",c:"dole",t:"John Primer Blues Concert",ti:"6pm",u:"https://www.thedole.org/"},
  {d:"2026-05-03",c:"dole",t:"Open Air Market Starts",ti:"Sundays 10am-2pm",u:"https://www.farmersmarketatthedole.org/"},
  {d:"2026-07-02",c:"dole",t:"Lakeside Festival Day 1",u:"https://www.thedole.org/the-fest"},
  {d:"2026-07-03",c:"dole",t:"Lakeside Festival Day 2",u:"https://www.thedole.org/the-fest"},
  {d:"2026-07-04",c:"dole",t:"Lakeside Festival Day 3",u:"https://www.thedole.org/the-fest"},
  {d:"2026-07-05",c:"dole",t:"Lakeside Festival Day 4",u:"https://www.thedole.org/the-fest"},
  // RAUE
  {d:"2026-04-18",c:"raue",t:"GreenRoom Improv",ti:"7pm",u:"https://www.rfrauecenter.org/"},
  {d:"2026-05-16",c:"raue",t:"Foreigner Tribute",ti:"7pm",u:"https://www.rfrauecenter.org/"},
  // DOWNTOWN CL
  {d:"2026-06-13",c:"downtowncl",t:"Farmers Market Opens",ti:"Sat 8am-1pm thru Sep 26",u:"https://downtowncl.org/farmers-market/"},
  {d:"2026-09-26",c:"downtowncl",t:"Last Farmers Market",u:"https://downtowncl.org/farmers-market/"},
  {d:"2026-09-26",c:"downtowncl",t:"Johnny Appleseed Festival",u:"https://downtowncl.org/annual-events/"},
  // OTHER COMMUNITY
  {d:"2026-04-16",c:"community",t:"Women in Wealth",ti:"Fork It Foods, 6pm",u:""},
  {d:"2026-04-22",c:"community",t:"Earth Day",u:""},
  {d:"2026-04-25",c:"community",t:"BMW Cars & Coffee",ti:"9am",u:""},
  {d:"2026-05-09",c:"community",t:"Mom Fest at The Quarry",ti:"10am",u:""},
  {d:"2026-05-22",c:"community",t:"Jump Into Summer",ti:"The Quarry, 7:30pm",u:""},
  // DEADLINES
  {d:"2026-05-31",c:"deadline",t:"Liquor License Renewal",ti:"Class 29 #2025-125",u:""}
];
var ly={lr:true,deadline:false,holiday:false,d47:false,d155:false,parkdist:false,dole:false,raue:false,downtowncl:false,community:false};
var lrE=[];
var st="loading";

function pt(i){
  if(!i.start||!i.start.dateTime)return null;
  var d=new Date(i.start.dateTime),h=d.getHours(),m=d.getMinutes();
  var h2=h%12||12,a=h>=12?"pm":"am",ms=m>0?":"+String(m).padStart(2,"0"):"";
  var t=h2+ms+a;
  if(i.end&&i.end.dateTime){var e=new Date(i.end.dateTime),eh=e.getHours(),em=e.getMinutes();t+="\u2013"+(eh%12||12)+(em>0?":"+String(em).padStart(2,"0"):"")+((eh>=12)?"pm":"am");}
  return t;
}
function xl(r){if(!r)return[];var m=r.match(/(https?:\/\/[^\s<>"]+)/g);return m||[];}
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function gw(s,e){var w=[],c=new Date(s);var d=c.getDay();c.setDate(c.getDate()+(d===0?-6:1-d));var en=new Date(e);while(c<=en){var wk=[];for(var i=0;i<7;i++){wk.push(new Date(c));c.setDate(c.getDate()+1);}w.push(wk);}return w;}
function it(d){var t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}

function ef(ds){
  var all=lrE.concat(S.map(function(e){return{date:e.d,cat:e.c,title:e.t,time:e.ti||null,url:e.u||null};}));
  return all.filter(function(e){return e.date===ds&&ly[e.cat];});
}

function render(){
  var weeks=gw("2026-04-13","2026-09-27");
  var DN=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var b=document.getElementById("badge");
  if(st==="live"){b.style.color="#6B9E7E";b.style.opacity="1";b.textContent="\u25CF Live";}
  else if(st==="snap"){b.style.color="#C9A45C";b.style.opacity="1";b.textContent="\u25CF Offline";}
  else{b.style.color="#99BAB4";b.style.opacity="0.6";b.textContent="\u25CB Connecting\u2026";}

  var lb=document.getElementById("btns");
  lb.innerHTML='<span class="lyr-l">Layers:</span>';
  Object.keys(C).forEach(function(k){
    var v=C[k],on=ly[k];
    var btn=document.createElement("button");
    btn.className="lb"+(on?" on":"");
    btn.style.border=on?"2px solid "+v.br:"2px solid rgba(255,255,255,0.1)";
    btn.style.background=on?v.bg:"rgba(255,255,255,0.03)";
    btn.style.color=on?v.tx:"rgba(239,219,178,0.3)";
    var tag=k==="lr"&&st==="live"?"LIVE":(on?"ON":"OFF");
    btn.innerHTML='<span class="ld" style="background:'+(on?v.br:"rgba(255,255,255,0.12)")+'"></span>'+v.l+' <span style="font-size:8px;opacity:0.6">'+tag+'</span>';
    btn.onclick=function(){ly[k]=!ly[k];render();};
    lb.appendChild(btn);
  });

  var dh=document.getElementById("dh");dh.innerHTML="";
  DN.forEach(function(d){var e=document.createElement("div");e.className="dhl";e.textContent=d;dh.appendChild(e);});

  var wc=document.getElementById("wks");wc.innerHTML="";
  var pm=-1;
  weeks.forEach(function(wk){
    var mid=wk[3],tm=mid.getMonth();
    if(tm!==pm){pm=tm;var mh=document.createElement("div");mh.className="mh";var ms=document.createElement("span");ms.textContent=mid.toLocaleDateString("en-US",{month:"long",year:"numeric"});mh.appendChild(ms);wc.appendChild(mh);}
    var g=document.createElement("div");g.className="wg";
    wk.forEach(function(day,di){
      var ds=fmt(day),evts=ef(ds),td=it(day),we=di>=5;
      var cell=document.createElement("div");
      cell.className="dc"+(td?" td":"")+(we&&!td?" we":"");
      var num=document.createElement("div");num.className="dn"+(td?" td":"");
      if(td)num.innerHTML='<span class="td-dot"></span>'+day.getDate();
      else num.textContent=day.getDate();
      cell.appendChild(num);

      evts.forEach(function(evt){
        var cat=C[evt.cat];
        var el=document.createElement("a");
        el.className="ev";
        el.style.background=cat.bg;
        el.style.borderLeft="3px solid "+cat.br;
        el.style.color=cat.tx;
        if(evt.url){el.href=evt.url;el.target="_blank";}
        el.textContent=evt.title;
        if(evt.time){
          var te=document.createElement("div");te.className="ev-t";te.textContent=evt.time;el.appendChild(te);
        }
        cell.appendChild(el);
      });
      g.appendChild(cell);
    });
    wc.appendChild(g);
  });

  document.getElementById("ft").innerHTML=st==="live"
    ?"LR Events: Live via Google Calendar \u00B7 Click any event to open source"
    :"Connecting\u2026";
}

fetch(P+"?action=gcal")
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(data){
    var items=data.items||[];
    lrE=items.map(function(i){
      var date=i.start.date||(i.start.dateTime?i.start.dateTime.split("T")[0]:null);
      var time=pt(i);
      var raw=i.description||"";
      var links=xl(raw);
      // Pick best link: Toast first, then Google Calendar event
      var url=i.htmlLink||"";
      for(var j=0;j<links.length;j++){if(links[j].indexOf("toasttab.com/restaurants/admin/invoices/events")>-1||links[j].indexOf("toasttab.com/restaurants/admin/invoices/leads")>-1){url=links[j];break;}}
      return{date:date,cat:"lr",title:i.summary||"Untitled",time:time,url:url};
    }).filter(function(e){return e.date;});
    st=lrE.length>0?"live":"snap";
    render();
  })
  .catch(function(){st="snap";render();});

render();
</script>
</body>
</html>
